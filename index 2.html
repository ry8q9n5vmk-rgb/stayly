<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Demo Hotel — Misafir Bilgilendirme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7;
    --bg-2: #f3f1ec;
    --surface: rgba(0, 0, 0, 0.03);
    --border: rgba(0, 0, 0, 0.08);
    --border-strong: rgba(0, 0, 0, 0.16);
    --accent: #b8985a;
    --accent-soft: #c9a96a;
    --accent-dim: rgba(184, 152, 90, 0.55);
    --text: #1a1814;
    --text-dim: rgba(26, 24, 20, 0.6);
    --dark: #1a1814;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* soft warm wash */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1100px 700px at 85% -10%, rgba(184, 152, 90, 0.07), transparent 60%),
      radial-gradient(900px 600px at -5% 100%, rgba(184, 152, 90, 0.05), transparent 55%);
    z-index: 0;
  }

  .reels {
    height: 100vh;
    height: 100dvh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    position: relative;
    z-index: 1;
  }
  .reels::-webkit-scrollbar { display: none; }

  .slide {
    height: 100vh;
    height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 28px 100px;
    text-align: center;
    position: relative;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 440px;
    animation: rise 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon {
    font-size: 44px;
    margin-bottom: 32px;
    opacity: 0.95;
    filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.45));
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 2.4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  h1 {
    font-family: "Fraunces", "Times New Roman", serif;
    font-size: 44px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.8px;
    margin-bottom: 24px;
    color: var(--text);
    font-variation-settings: "opsz" 72;
  }
  h1.hero {
    font-size: 56px;
    letter-spacing: -1.2px;
  }

  /* ornament becomes a tiny flat divider */
  .ornament {
    width: 32px;
    height: 1px;
    background: var(--border-strong);
    margin: 0 0 24px;
  }
  .ornament .line, .ornament .dot { display: none; }

  .subtitle {
    font-family: "Fraunces", serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-dim);
    margin-bottom: 20px;
    letter-spacing: -0.2px;
  }

  p.body {
    font-size: 16px;
    line-height: 1.65;
    max-width: 380px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: -0.1px;
  }
  p.body + p.body { margin-top: 12px; }

  strong {
    color: var(--text);
    font-weight: 500;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    font-family: "Inter", sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    backdrop-filter: blur(12px);
  }

  .time-block {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 8px 0 26px;
  }
  .time-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .time-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
  }
  .time-range {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .time-range .dash {
    width: 18px;
    height: 1px;
    background: var(--border-strong);
  }

  .big-number {
    font-family: "Fraunces", serif;
    font-size: 140px;
    font-weight: 300;
    line-height: 0.95;
    margin: 4px 0 28px;
    color: var(--accent);
    letter-spacing: -5px;
    font-variation-settings: "opsz" 144;
  }

  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: bounce 2.4s ease-in-out infinite;
    z-index: 3;
    text-transform: uppercase;
    font-weight: 500;
  }
  .scroll-hint .arrow {
    width: 1px;
    height: 22px;
    background: linear-gradient(180deg, transparent, var(--text-dim));
    position: relative;
  }
  .scroll-hint .arrow::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 6px;
    height: 6px;
    border-right: 1px solid var(--text-dim);
    border-bottom: 1px solid var(--text-dim);
    transform: translateX(-50%) rotate(45deg);
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
    50% { transform: translateX(-50%) translateY(6px); opacity: 1; }
  }

  .progress {
    position: fixed;
    top: 18px;
    left: 24px;
    right: 24px;
    display: flex;
    gap: 4px;
    z-index: 100;
  }
  .progress .bar {
    flex: 1;
    height: 2px;
    background: rgba(0, 0, 0, 0.1);
    border-radius: 2px;
    overflow: hidden;
    transition: background 0.5s ease;
  }
  .progress .bar.active {
    background: var(--accent);
  }

  .brand {
    position: absolute;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text);
    font-weight: 600;
    z-index: 3;
    text-transform: uppercase;
    opacity: 0.9;
  }

  .heart {
    font-size: 22px;
    margin-top: 22px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .signature {
    margin-top: 32px;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Language switcher — modern pill */
  .lang-switch {
    position: fixed;
    top: 38px;
    right: 20px;
    z-index: 101;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text);
    user-select: none;
    transition: all 0.25s ease;
  }
  .lang-switch:hover {
    border-color: var(--border-strong);
    background: rgba(0, 0, 0, 0.05);
  }
  .lang-switch .caret {
    font-size: 8px;
    opacity: 0.6;
    transition: transform 0.2s ease;
  }
  .lang-switch.open .caret { transform: rotate(180deg); }

  .lang-menu {
    position: fixed;
    top: 76px;
    right: 20px;
    z-index: 101;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 14px;
    padding: 6px;
    display: none;
    flex-direction: column;
    min-width: 150px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
    animation: menuIn 0.2s ease;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .lang-menu.open { display: flex; }
  .lang-menu button {
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    padding: 10px 14px;
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s ease;
  }
  .lang-menu button:hover { background: rgba(0, 0, 0, 0.05); }
  .lang-menu button.active {
    color: var(--accent);
    background: rgba(184, 152, 90, 0.1);
  }

  html[dir="rtl"] .lang-switch { right: auto; left: 20px; }
  html[dir="rtl"] .lang-menu { right: auto; left: 20px; }
  html[dir="rtl"] .lang-menu button { text-align: right; }
  html[dir="rtl"] .eyebrow { flex-direction: row-reverse; }

  @media (max-width: 380px) {
    h1 { font-size: 38px; }
    h1.hero { font-size: 46px; }
    .big-number { font-size: 110px; }
  }

  /* ---- CTA button (farewell) ---- */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 28px;
    padding: 14px 26px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-family: "Inter", sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.2s ease;
    box-shadow: 0 10px 28px -10px rgba(184, 152, 90, 0.5);
  }
  .cta:hover { transform: translateY(-1px); background: #a88847; box-shadow: 0 16px 36px -10px rgba(184, 152, 90, 0.55); }
  .cta-outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    box-shadow: none;
  }
  .cta-outline:hover { background: rgba(184, 152, 90, 0.08); color: var(--accent); box-shadow: none; }
  .cta .arrow { transition: transform 0.2s ease; }
  .cta:hover .arrow { transform: translateX(4px); }
  html[dir="rtl"] .cta:hover .arrow { transform: translateX(-4px); }

  /* ---- Explore overlay ---- */
  .explore {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    color: var(--text);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
    will-change: transform;
  }
  .explore.open { transform: translateY(0); }
  .explore::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(900px 500px at 90% -5%, rgba(184, 152, 90, 0.06), transparent 55%),
      radial-gradient(700px 400px at -5% 100%, rgba(184, 152, 90, 0.04), transparent 50%);
  }
  .explore-head {
    position: sticky;
    top: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, rgba(251,250,247,0.96) 0%, rgba(251,250,247,0.85) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .close-btn {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: background 0.2s ease;
  }
  .close-btn:hover { background: rgba(0,0,0,0.06); }
  .explore-title {
    font-family: "Fraunces", serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }

  .explore-hero {
    position: relative;
    z-index: 1;
    padding: 40px 24px 20px;
    text-align: center;
  }
  .explore-hero .eyebrow { justify-content: center; }
  .explore-hero h2 {
    font-family: "Fraunces", serif;
    font-size: 42px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.8px;
    margin-bottom: 12px;
    font-variation-settings: "opsz" 72;
  }
  .explore-hero p {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto;
  }

  .cat-bar {
    position: sticky;
    top: 72px;
    z-index: 2;
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    background: linear-gradient(180deg, rgba(251,250,247,0.95) 0%, rgba(251,250,247,0.8) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    padding: 9px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 999px;
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .cat-pill:hover { color: var(--text); }
  .cat-pill.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .places {
    position: relative;
    z-index: 1;
    padding: 22px 20px 80px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    max-width: 640px;
    margin: 0 auto;
  }
  .place {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 18px 20px;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    color: inherit;
    text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
  }
  .place:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(184, 152, 90, 0.12);
  }
  .place-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; text-align: start; }
  .place-name {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--text);
  }
  .place-district {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .place-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: rgba(184, 152, 90, 0.12);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 14px;
  }
  html[dir="rtl"] .place-icon { transform: scaleX(-1); }

  .reception-note {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto 60px;
    padding: 18px 22px;
    background: linear-gradient(135deg, rgba(184, 152, 90, 0.1), rgba(184, 152, 90, 0.04));
    border: 1px solid rgba(184, 152, 90, 0.25);
    border-radius: 16px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.5;
    letter-spacing: 0.1px;
  }
  .reception-note .note-icon {
    flex-shrink: 0;
    font-size: 20px;
  }
  html[dir="rtl"] .reception-note { text-align: right; }

  /* ---- Metro map preview thumbnail (in slide) ---- */
  .map-thumb {
    margin-top: 8px;
    width: 100%;
    max-width: 380px;
    aspect-ratio: 16 / 10;
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    background: #fff;
    padding: 0;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.25s ease;
  }
  .map-thumb:hover { transform: translateY(-2px); box-shadow: 0 16px 36px -12px rgba(184, 152, 90, 0.3); }
  .map-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .map-thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.55) 100%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .map-thumb-icon { font-size: 14px; opacity: 0.9; }

  /* ---- Metro fullscreen overlay ---- */
  .metro-overlay {
    position: fixed;
    inset: 0;
    z-index: 250;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .metro-overlay.open { transform: translateY(0); }
  .metro-head {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(251,250,247,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .metro-stage {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    background: #f8f7f3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .metro-stage img {
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
    touch-action: pinch-zoom;
  }
  .menu-stage {
    flex: 1;
    background: #1a1814;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .menu-stage img {
    width: 100%;
    max-width: 720px;
    height: auto;
    display: block;
    border-radius: 8px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
  }
</style>
</head>
<body>

<button class="lang-switch" id="langSwitch"><span id="langLabel">TR</span><span class="caret">▾</span></button>
<div class="lang-menu" id="langMenu"></div>

<div class="progress" id="progress"></div>

<div class="reels" id="reels"></div>

<section class="explore" id="explore" aria-hidden="true">
  <header class="explore-head">
    <button class="close-btn" id="closeExplore" aria-label="Close">✕</button>
    <div class="explore-title" id="exploreTitleSmall">İstanbul</div>
    <div style="width:40px"></div>
  </header>
  <div class="explore-hero">
    <div class="eyebrow" id="exploreEyebrow">KEŞFET</div>
    <h2 id="exploreTitle">İstanbul'u Keşfedin</h2>
    <p id="exploreBody">Otelimize yakın öne çıkan mekânlar.</p>
  </div>
  <nav class="cat-bar" id="catBar"></nav>
  <div class="places" id="places"></div>
  <div class="reception-note" id="receptionNote">
    <span class="note-icon">💬</span>
    <span id="receptionNoteText">Yol tarifi veya tavsiye için resepsiyonu arayabilirsiniz.</span>
  </div>
</section>

<div class="metro-overlay" id="metroOverlay" aria-hidden="true">
  <header class="metro-head">
    <button class="close-btn" id="closeMetro" aria-label="Close">✕</button>
    <div class="explore-title">Istanbul Rail Systems</div>
    <a class="close-btn" href="assets/istanbul-metro.pdf" download title="Download PDF">⤓</a>
  </header>
  <div class="metro-stage" id="metroStage">
    <img src="assets/istanbul-metro.png" alt="Istanbul Rail Systems Map" id="metroImg"/>
  </div>
</div>

<div class="metro-overlay menu-overlay" id="menuOverlay" aria-hidden="true">
  <header class="metro-head">

  let activeCategory = "museums";

  function renderExplore(lang) {
    const e = EXPLORE_I18N[lang] || EXPLORE_I18N.en;
    document.getElementById('exploreEyebrow').textContent = e.eyebrow;
    document.getElementById('exploreTitle').textContent = e.title;
    document.getElementById('exploreTitleSmall').textContent = e.title;
    document.getElementById('exploreBody').textContent = e.body;
    document.getElementById('receptionNoteText').textContent = e.note;

    const catBar = document.getElementById('catBar');
    catBar.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const pill = document.createElement('button');
      pill.className = 'cat-pill' + (cat.id === activeCategory ? ' active' : '');
      pill.dataset.cat = cat.id;
      pill.innerHTML = `<span>${cat.icon}</span><span>${e.cats[cat.id]}</span>`;
      pill.addEventListener('click', () => {
        activeCategory = cat.id;
        renderExplore(lang);
        document.getElementById('places').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      catBar.appendChild(pill);
    });

    const places = document.getElementById('places');
    places.innerHTML = '';
    const cat = CATEGORIES.find(c => c.id === activeCategory) || CATEGORIES[0];
    cat.places.forEach(p => {
      const a = document.createElement('a');
      a.className = 'place';
      a.href = 'https://www.google.com/maps/dir/?api=1'
        + '&origin=' + encodeURIComponent('Lamartine Hotel, Taksim, İstanbul')
        + '&destination=' + encodeURIComponent(p.name + ', ' + p.district + ', İstanbul')
        + '&travelmode=transit';
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <div class="place-info">
          <div class="place-name">${p.name}</div>
          <div class="place-district">${p.district}</div>
        </div>
        <div class="place-icon">↗</div>`;
      places.appendChild(a);
    });
  }

  function openExplore() {
    const el = document.getElementById('explore');
    el.classList.add('open');
    el.setAttribute('aria-hidden', 'false');
    el.scrollTop = 0;
    document.body.style.overflow = 'hidden';
  }
  function closeExplore() {
    const el = document.getElementById('explore');
    el.classList.remove('open');
    el.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  document.getElementById('closeExplore').addEventListener('click', closeExplore);

  function openMetro() {
    const el = document.getElementById('metroOverlay');
    el.classList.add('open');
    el.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    // Center the large image in the scroll viewport
    requestAnimationFrame(() => {
      const stage = document.getElementById('metroStage');
      const img = document.getElementById('metroImg');
      stage.scrollLeft = Math.max(0, (img.scrollWidth - stage.clientWidth) / 2);
      stage.scrollTop = Math.max(0, (img.scrollHeight - stage.clientHeight) / 2);
    });
  }
  function closeMetro() {
    const el = document.getElementById('metroOverlay');
    el.classList.remove('open');
    el.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  document.getElementById('closeMetro').addEventListener('click', closeMetro);

  function detectLang() {
    const saved = localStorage.getItem('lang');
    if (saved && I18N[saved]) return saved;
    const candidates = [navigator.language, ...(navigator.languages || [])];
    for (const raw of candidates) {
      if (!raw) continue;
      const base = raw.toLowerCase().split('-')[0];
      if (I18N[base]) return base;
    }
    return 'en';
  }

  function render(lang) {
    const t = I18N[lang];
    const meta = LANGS[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = meta.dir;

    const reels = document.getElementById('reels');
    reels.innerHTML = '';

    SLIDES.forEach((s) => {
      const data = t[s.id];
      const section = document.createElement('section');
      section.className = 'slide';

      const frame = document.createElement('div');

      section.appendChild(frame);

      if (s.brand) {
        const brand = document.createElement('div');
        brand.className = 'brand';
        brand.textContent = 'LAMARTINE HOTEL';
        section.appendChild(brand);
      }

      const content = document.createElement('div');

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = s.icon;
      content.appendChild(icon);

      const eyebrow = document.createElement('div');
      eyebrow.className = 'eyebrow';
      eyebrow.textContent = data.eyebrow;
      content.appendChild(eyebrow);

      const h1 = document.createElement('h1');
      if (s.hero) h1.className = 'hero';
      h1.textContent = data.title;
      content.appendChild(h1);

      const orn = document.createElement('div');
      orn.className = 'ornament';
      orn.innerHTML = '<span class="line"></span><span class="dot"></span><span class="line"></span>';
      content.appendChild(orn);

      if (data.subtitle) {
        const sub = document.createElement('p');
        sub.className = 'subtitle';
        sub.textContent = data.subtitle;
        content.appendChild(sub);
      }

      if (s.timeRange) {
        const wrap = document.createElement('div');
        wrap.className = 'time-block';
        const renderRange = (label, range) => {
          const row = document.createElement('div');
          row.className = 'time-row';
          if (label) {
            const lab = document.createElement('div');
            lab.className = 'time-label';
            lab.textContent = label;
            row.appendChild(lab);
          }
          const tr = document.createElement('div');
          tr.className = 'time-range';
          tr.innerHTML = `<span class="chip">${range[0]}</span><span class="dash"></span><span class="chip">${range[1]}</span>`;
          row.appendChild(tr);
          return row;
        };
        if (s.weekendTimeRange) {
          wrap.appendChild(renderRange(data.weekday || '', s.timeRange));
          wrap.appendChild(renderRange(data.weekend || '', s.weekendTimeRange));
        } else {
          wrap.appendChild(renderRange('', s.timeRange));
        }
        content.appendChild(wrap);
      }

      if (s.bigNumber) {
        const n = document.createElement('div');
        n.className = 'big-number';
        n.textContent = s.bigNumber;
        content.appendChild(n);
      }

      const body = document.createElement('p');
      body.className = 'body';
      body.innerHTML = data.body;
      content.appendChild(body);

      if (s.heart) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = '🤍';
        content.appendChild(h);
      }

      if (s.mapPreview) {
        const thumb = document.createElement('button');
        thumb.className = 'map-thumb';
        thumb.innerHTML = `
          <img src="assets/istanbul-metro.png" alt="Istanbul metro map" loading="lazy"/>
          <span class="map-thumb-overlay">
            <span class="map-thumb-icon">⛶</span>
            <span class="map-thumb-label">${data.open}</span>
          </span>`;
        thumb.addEventListener('click', openMetro);
        content.appendChild(thumb);
      }

      if (s.menuButton) {
        const btn = document.createElement('button');
        btn.className = 'cta cta-outline';
        btn.innerHTML = `<span>${data.menu}</span><span class="arrow">→</span>`;
        btn.addEventListener('click', openMenu);
        content.appendChild(btn);
      }

      if (s.id === 'farewell') {
        const cta = document.createElement('button');
        cta.className = 'cta';
        const ctaLabel = (EXPLORE_I18N[lang] || EXPLORE_I18N.en).cta;
        cta.innerHTML = `<span>${ctaLabel}</span><span class="arrow">→</span>`;
        cta.addEventListener('click', openExplore);
        content.appendChild(cta);
      }

      if (s.signature) {
        const sig = document.createElement('div');
        sig.className = 'signature';
        sig.textContent = 'LAMARTINE HOTEL';
        content.appendChild(sig);
      }

      section.appendChild(content);

      if (s.scrollHint) {
        const hint = document.createElement('div');
        hint.className = 'scroll-hint';
        hint.innerHTML = `<span>${t.scroll}</span><span class="arrow">↑</span>`;
        section.appendChild(hint);
      }

      reels.appendChild(section);
    });

    // update language switcher
    document.getElementById('langLabel').textContent = meta.code;

    // rebuild progress bars
    const progress = document.getElementById('progress');
    progress.innerHTML = '';
    for (let i = 0; i < SLIDES.length; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      progress.appendChild(bar);
    }
    updateProgress();

    // rebuild menu active state
    document.querySelectorAll('#langMenu button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });

    // scroll back to first slide
    reels.scrollTo({ top: 0, behavior: 'instant' });

    // re-render explore overlay in new language
    renderExplore(lang);
  }

  function updateProgress() {
    const reels = document.getElementById('reels');
    const bars = document.querySelectorAll('#progress .bar');
    const idx = Math.round(reels.scrollTop / window.innerHeight);
    bars.forEach((b, i) => b.classList.toggle('active', i <= idx));
  }

  // Build language menu
  const langMenu = document.getElementById('langMenu');
  Object.entries(LANGS).forEach(([code, info]) => {
    const btn = document.createElement('button');
    btn.dataset.lang = code;
    btn.textContent = info.name;
    btn.addEventListener('click', () => {
      localStorage.setItem('lang', code);
      render(code);
      langMenu.classList.remove('open');
    });
    langMenu.appendChild(btn);
  });

  document.getElementById('langSwitch').addEventListener('click', (e) => {
    e.stopPropagation();
    langMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => langMenu.classList.remove('open'));

  // Initial render
  const currentLang = detectLang();
  render(currentLang);

  // Bind scroll + keys after first render
  document.getElementById('reels').addEventListener('scroll', updateProgress, { passive: true });
  window.addEventListener('resize', updateProgress);

  document.addEventListener('keydown', (e) => {
    const reels = document.getElementById('reels');
    const h = window.innerHeight;
    if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      reels.scrollBy({ top: h, behavior: 'smooth' });
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      reels.scrollBy({ top: -h, behavior: 'smooth' });
    }
  });
</script>

</body>
</html>
